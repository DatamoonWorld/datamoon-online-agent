server {
    listen 80;
    server_name gateway-pbe.datamoononline.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name gateway-pbe.datamoononline.com.br;

    ssl_certificate /etc/letsencrypt/live/gateway-pbe.datamoononline.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gateway-pbe.datamoononline.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        limit_req zone=datamoon_gateway_rate burst=10 nodelay;
        limit_conn datamoon_gateway_connections 5;
        proxy_pass http://127.0.0.1:5100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
