server {
    listen 80;
    server_name datamoononline.com.br;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name datamoononline.com.br;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/datamoononline.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datamoononline.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 32k;
    limit_conn datamoon_web_connections 20;

    location = /login {
        limit_req zone=datamoon_web_auth_rate burst=10 nodelay;
        include /etc/nginx/snippets/datamoon-web-proxy.conf;
    }

    location = /register {
        limit_req zone=datamoon_web_auth_rate burst=5 nodelay;
        include /etc/nginx/snippets/datamoon-web-proxy.conf;
    }

    location / {
        include /etc/nginx/snippets/datamoon-web-proxy.conf;
    }
}
